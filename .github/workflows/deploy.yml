# [!IMPORTANT] Human review needed — AI-generated, unreviewed. See AI_POLICY.md.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token scoped for Pages OIDC deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; never cancel an in-flight production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Reads the pnpm version from package.json "packageManager" — single
      # source of truth, matches the lockfile that generated it.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: pnpm

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & format (Biome, no writes)
        run: pnpm exec biome ci .

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test -- --run

      - name: Build static export
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
